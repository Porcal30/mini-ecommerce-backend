<nav class="bg-white/95 backdrop-blur text-gray-800 shadow-sm border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3">

    <div class="flex items-center justify-between">

      <!-- LOGO -->
      <a
        routerLink="/products"
        class="flex items-center gap-3 group"
        (click)="closeMenu()"
      >
        <span class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-2xl group-hover:bg-blue-100 transition">
          🛒
        </span>

        <span class="text-lg sm:text-xl font-bold text-blue-600">
          Mini E-Commerce
        </span>
      </a>

      <!-- MOBILE MENU BUTTON -->
      <button
        type="button"
        class="md:hidden w-10 h-10 rounded-xl border border-gray-200 flex items-center justify-center text-xl text-gray-700 hover:bg-gray-50 transition"
        (click)="toggleMenu()"
      >
        ☰
      </button>

      <!-- DESKTOP MENU -->
      <div class="hidden md:flex items-center gap-2 text-sm font-medium">

        <a
          routerLink="/products"
          class="px-3 py-2 rounded-lg text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
          *ngIf="isLoggedIn() "
        >
          Products
        </a>

        <a
          routerLink="/cart"
          class="px-3 py-2 rounded-lg text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
          *ngIf="isLoggedIn() && !isAdmin()"
        >
          Cart
        </a>

        <a
          routerLink="/orders"
          class="px-3 py-2 rounded-lg text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
          *ngIf="isLoggedIn() && !isAdmin()"
        >
          Orders
        </a>

        <a
          routerLink="/admin"
          class="px-3 py-2 rounded-lg text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
          *ngIf="isLoggedIn() && isAdmin()"
        >
          Admin
        </a>

        <div
          *ngIf="isLoggedIn()"
          class="ml-3 pl-3 border-l border-gray-200 flex items-center gap-3"
        >
          <span class="text-sm text-gray-500">
            Hi, <span class="font-semibold text-gray-700">{{ getUserName() }}</span>
          </span>

          <button
            type="button"
            (click)="logout()"
            class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl font-semibold transition"
          >
            Logout
          </button>
        </div>

        <a
          routerLink="/login"
          class="px-3 py-2 rounded-lg text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
          *ngIf="!isLoggedIn() && !isAuthPage()"
        >
          Login
        </a>

        <a
          routerLink="/register"
          class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-semibold transition"
          *ngIf="!isLoggedIn() && !isAuthPage()"
        >
          Register
        </a>
      </div>
    </div>

    <!-- MOBILE MENU -->
    <div
      *ngIf="menuOpen"
      class="md:hidden mt-4 border-t border-gray-200 pt-4 space-y-2 text-sm font-medium"
    >
      <a
        routerLink="/products"
        class="block px-3 py-3 rounded-xl text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
        *ngIf="isLoggedIn()"
        (click)="closeMenu()"
      >
        Products
      </a>

      <a
        routerLink="/cart"
        class="block px-3 py-3 rounded-xl text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
        *ngIf="isLoggedIn() && !isAdmin()"
        (click)="closeMenu()"
      >
        Cart
      </a>

      <a
        routerLink="/orders"
        class="block px-3 py-3 rounded-xl text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
        *ngIf="isLoggedIn() && !isAdmin()"
        (click)="closeMenu()"
      >
        Orders
      </a>

      <a
        routerLink="/admin"
        class="block px-3 py-3 rounded-xl text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
        *ngIf="isLoggedIn() && isAdmin()"
        (click)="closeMenu()"
      >
        Admin
      </a>

      <div
        *ngIf="isLoggedIn()"
        class="px-3 py-3 rounded-xl bg-gray-50 text-gray-600"
      >
        Hi, <span class="font-semibold text-gray-800">{{ getUserName() }}</span>
      </div>

      <button
        *ngIf="isLoggedIn()"
        type="button"
        (click)="logout()"
        class="w-full bg-red-600 hover:bg-red-700 text-white px-4 py-3 rounded-xl font-semibold transition"
      >
        Logout
      </button>

      <a
        routerLink="/login"
        class="block px-3 py-3 rounded-xl text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition"
        *ngIf="!isLoggedIn()"
        (click)="closeMenu()"
      >
        Login
      </a>

      <a
        routerLink="/register"
        class="block text-center bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-xl font-semibold transition"
        *ngIf="!isLoggedIn()"
        (click)="closeMenu()"
      >
        Register
      </a>
    </div>

  </div>
</nav>
